name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25"]
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Install staticcheck
        if: runner.os != 'Windows'
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Staticcheck
        if: runner.os != 'Windows'
        run: staticcheck ./...
      - name: Install govulncheck
        if: runner.os != 'Windows'
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Vulnerability check
        if: runner.os != 'Windows'
        run: govulncheck ./...
      - name: Test
        run: go test -race -coverprofile coverage.out ./...
      - name: Coverage report
        if: runner.os != 'Windows'
        run: go tool cover -func=coverage.out | tail -1
      - name: Coverage threshold
        if: runner.os != 'Windows'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 60" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi
      - name: Check coverage wiki
        if: runner.os != 'Windows' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: coverage_wiki
        run: |
          if git ls-remote --exit-code "https://github.com/${GITHUB_REPOSITORY}.wiki" HEAD >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping coverage badge because ${GITHUB_REPOSITORY}.wiki is not enabled"
          fi
      - name: Coverage badge
        if: runner.os != 'Windows' && github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.coverage_wiki.outputs.exists == 'true'
        continue-on-error: true
        uses: ncruces/go-coverage-report@v0
        with:
          coverage-file: coverage.out
          report: true
          chart: true
          amend: true

  release:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
