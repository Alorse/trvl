fulcrum: "1.0"
name: trvl_search_dates
description: >-
  Find the cheapest flight prices across a date range via Google Flights
  (reverse-engineered API, no key required). Returns one price per departure
  date, useful for finding the best travel dates for a route.
  Inspired by fli (github.com/punitarani/fli), reimplemented in Go.

schema:
  input:
    type: object
    properties:
      origin:
        type: string
        description: Departure airport IATA code (e.g., HEL, JFK, NRT)
      destination:
        type: string
        description: Arrival airport IATA code (e.g., NRT, LAX, CDG)
      start_date:
        type: string
        description: Start of date range in YYYY-MM-DD format
      end_date:
        type: string
        description: End of date range in YYYY-MM-DD format
      trip_duration:
        type: integer
        description: Trip duration in days for round-trip (omit for one-way)
      is_round_trip:
        type: boolean
        description: Whether to search round-trip fares (default false)
    required: [origin, destination, start_date, end_date]
  output:
    type: object
    properties:
      success:
        type: boolean
      count:
        type: integer
      trip_type:
        type: string
      date_range:
        type: string
      dates:
        type: array
        items:
          type: object
          properties:
            date:
              type: string
            price:
              type: number
            currency:
              type: string
            return_date:
              type: string
      error:
        type: string

providers:
  primary:
    service: cli
    cost_per_call: 0
    timeout: 30
    config:
      command: trvl
      args:
        - dates
        - "{origin}"
        - "{destination}"
        - "{start_date}"
        - "{end_date}"
        - "--format"
        - "json"

cache:
  strategy: exact
  ttl: 600

auth:
  required: false

metadata:
  category: travel
  tags: [travel, flights, google-flights, dates, flexible, free, no-api-key]
  cost_category: free
  execution_time: medium
  read_only: true
  source: https://github.com/MikkoParkkola/trvl
  notes: >-
    Inspired by fli (github.com/punitarani/fli) by Punit Arani.
    Uses Google's internal batchexecute API with Chrome TLS fingerprint impersonation.
    No API key required. Longer TTL (600s) since date prices change less frequently.
